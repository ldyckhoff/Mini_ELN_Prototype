- id: alloy_melting
  label: Alloy Melting
  category_id: alloy_preparation
  category_label: Alloy Preparation
  hierarchy:
  - AlloyPreparation
  - AlloyMelting
  definition: The process of heating elemental materials above their melting points
    to create a homogeneous metallic alloy, typically resulting in an ingot. This
    operation may employ different heating methods such as arc, induction, or electron
    beam melting.
  synonyms:
  - arc melting
  - induction melting
  - electron beam melting
  - alloy synthesis via melting
  - master alloy preparation
  parameters:
  - id: input_materials
    label: Input Materials
    type: string
    required: true
    description: The elemental materials or precursor materials used to create the
      alloy.
    example_values:
    - Al
    - Au
    - Ag
    - Pd
    - Co
    - Cu
    status: official
    source_schema: official
  - id: input_material_purity
    label: Input Material Purity
    type: string
    required: true
    description: The purity level of the starting elemental materials.
    example_values: []
    status: official
    source_schema: official
  - id: melting_equipment
    label: Melting Equipment
    type: string
    required: true
    description: The instrument or furnace used to provide the heat for melting.
    example_values:
    - arc melter
    - high-frequency induction heating
    - electron beam melting equipment
    status: official
    source_schema: official
  - id: atmosphere
    label: Atmosphere
    type: string
    required: true
    description: The gas environment maintained during the melting process to prevent
      oxidation or contamination.
    example_values:
    - inert atmosphere
    - argon
    status: official
    source_schema: official
  - id: crucible_material
    label: Crucible Material
    type: string
    required: false
    description: The material of the container (crucible) used to hold the materials
      during melting.
    example_values:
    - quartz
    status: official
    source_schema: official
  - id: melting_temperature
    label: Melting Temperature
    type: number
    required: false
    description: The temperature at which the materials were melted.
    example_values: []
    status: official
    source_schema: official
  - id: melting_temperature_units
    label: Melting Temperature Units
    type: string
    required: false
    description: Units for melting_temperature.
    example_values: []
    status: official
    source_schema: official
  - id: melting_duration
    label: Melting Duration
    type: number
    required: false
    description: The amount of time the materials were held at melting temperature.
    example_values: []
    status: official
    source_schema: official
  - id: melting_duration_units
    label: Melting Duration Units
    type: string
    required: false
    description: Units for melting_duration.
    example_values: []
    status: official
    source_schema: official
  - id: output_form

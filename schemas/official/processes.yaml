- id: atomic_layer_deposition
  label: Atomic Layer Deposition
  category_id: thin_film_deposition
  category_label: Thin Film Deposition
  hierarchy:
  - ThinFilmDeposition
  - AtomicLayerDeposition
  definition: A vapor phase deposition technique that uses sequential, self-limiting
    surface reactions to deposit ultra-thin films with atomic-level thickness control.
  synonyms:
  - ALD
  parameters:
  - id: number_of_cycles
    label: Number Of Cycles
    type: integer
    required: true
    description: The number of ALD cycles performed to achieve the desired film thickness.
    example_values: []
    status: official
    source_schema: official
  - id: reactor_type
    label: Reactor Type
    type: string
    required: false
    description: The type of chemical reactor used for the ALD process.
    example_values:
    - continuous flow reactor
    status: official
    source_schema: official
  - id: substrate
    label: Substrate
    type: string
    required: true
    description: The material or structure upon which the ALD layers are deposited.
    example_values:
    - nanoporous bulk materials
    status: official
    source_schema: official
  - id: deposition_method
    label: Deposition Method
    type: string
    required: false
    description: Description of the chemical reaction mechanism used.
    example_values:
    - sequential, self-limiting surface reactions
    status: official
    source_schema: official
  status: official
  source_schema: official
